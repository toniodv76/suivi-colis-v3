<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accès suivi colis</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login card-panel">
    <h1>Suivi colis</h1>
    <p>Entre le code d'accès.</p>
    <form method="get" action="/">
      <input name="code" type="password" placeholder="Code" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ccc;font-size:18px;">
      <div class="actions">
        <button class="btn btn-primary" type="submit">Entrer</button>
      </div>
    </form>
  </div>
</body>
</html>
